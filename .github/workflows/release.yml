name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python backend (Linux)
        working-directory: ProjectPilot
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --onefile --name projectpilot-backend \
            --collect-all uvicorn \
            --collect-all websockets \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.asyncio \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.h11_impl \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.websockets_impl \
            --hidden-import uvicorn.lifespan.on \
            main.py

      - name: Stage backend binary
        run: |
          mkdir -p ProjectPilot_front/backend/linux
          cp ProjectPilot/dist/projectpilot-backend ProjectPilot_front/backend/linux/
          chmod +x ProjectPilot_front/backend/linux/projectpilot-backend

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Electron app (Linux)
        working-directory: ProjectPilot_front
        run: |
          npm install
          npm run build

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: ProjectPilot_front/release/**/*.AppImage
          if-no-files-found: error

      - name: Upload Linux Snap
        uses: actions/upload-artifact@v4
        with:
          name: linux-snap
          path: ProjectPilot_front/release/**/*.snap
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python backend (Windows)
        working-directory: ProjectPilot
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --onefile --name projectpilot-backend `
            --collect-all uvicorn `
            --collect-all websockets `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.asyncio `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.h11_impl `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.websockets_impl `
            --hidden-import uvicorn.lifespan.on `
            main.py

      - name: Stage backend binary
        shell: bash
        run: |
          mkdir -p ProjectPilot_front/backend/windows
          cp ProjectPilot/dist/projectpilot-backend.exe ProjectPilot_front/backend/windows/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Electron app (Windows)
        working-directory: ProjectPilot_front
        run: |
          npm install
          npm run build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ProjectPilot_front/release/**/*.exe
          if-no-files-found: error

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: dist/linux

      - name: Download Linux Snap
        uses: actions/download-artifact@v4
        with:
          name: linux-snap
          path: dist/snap

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/windows

      - name: Rename artifacts to stable filenames
        run: |
          find dist/linux  -name "*.AppImage" -exec mv {} dist/linux/ProjectPilot-Linux.AppImage \;
          find dist/snap   -name "*.snap"     -exec mv {} dist/snap/ProjectPilot-Linux.snap \;
          find dist/windows -name "*.exe"     -exec mv {} dist/windows/ProjectPilot-Windows-Setup.exe \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/linux/ProjectPilot-Linux.AppImage
            dist/snap/ProjectPilot-Linux.snap
            dist/windows/ProjectPilot-Windows-Setup.exe
